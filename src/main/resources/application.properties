# ============================================================
# SERVIDOR
# ============================================================
server.port=8080
spring.application.name=prestamos

# ============================================================
# BASE DE DATOS H2 (en memoria)
# Se destruye al parar la app 
# En producción esto sería una datasource Oracle.
# ============================================================
spring.datasource.url=jdbc:h2:mem:prestamosdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Consola web H2: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# JPA / HIBERNATE
# ============================================================
# create-drop: crea el esquema al arrancar y lo borra al parar.
# En producción -> "validate" con Flyway o Liquibase.
spring.jpa.hibernate.ddl-auto=create-drop
# Muestra las SQL que genera Hibernate.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ============================================================
# APACHE CAMEL
# ============================================================
# Nombre del contexto — aparece en logs.
camel.springboot.name=PrestamosContext

# Tiempo de espera al parar para que los mensajes en vuelo
# terminen de procesarse (graceful shutdown).
camel.springboot.shutdown-timeout=30

# ============================================================
# SISTEMA LEGADO SOAP (RiesgoCredito)
# En desarrollo apunta a un mock local.
# En producción se sobreescribe en application-prod.properties
# ============================================================
legado.riesgo-crediticio.url=http://localhost:9090/services/RiesgoCredito

# ============================================================
# LOGGING
# ============================================================
# DEBUG para nuestro código — vemos todos los logs propios.
logging.level.com.cajarural=DEBUG
# INFO para Camel — arranque de rutas, exchanges, etc.
logging.level.org.apache.camel=INFO
# WARN para Hibernate — demasiado verboso en DEBUG.
logging.level.org.hibernate=WARN

# ============================================================
# JACKSON (serialización JSON)
# ============================================================
# No incluir campos null en las respuestas REST.
spring.jackson.default-property-inclusion=non_null
# Fechas en formato ISO-8601, no como timestamp numérico.
spring.jackson.serialization.write-dates-as-timestamps=false